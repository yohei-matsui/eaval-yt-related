name: Scrape Related Videos

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      count:
        description: 'Number of videos'
        required: true
        default: '10'
      run_id:
        description: 'Unique run ID'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright==1.47.0
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: |
          python backend/scrape.py "${{ github.event.inputs.url }}" "${{ github.event.inputs.count }}" "${{ github.event.inputs.run_id }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "results: ${{ github.event.inputs.run_id }}" || echo "No changes"
          git push
